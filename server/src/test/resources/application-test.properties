# QVEVRI server — test profile (in-memory H2)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.h2.console.enabled=false

# Dev auto-register also on under test
app.auth.auto-register=true

# World clock — effectively frozen in tests (86400000 s ≈ 1000 days per sim-day)
# Tests control time manually via POST /api/world/advance
world.real-seconds-per-sim-day=86400000

# Flyway — must stay disabled for H2 test profile; schema is managed by ddl-auto=create-drop
spring.flyway.enabled=false

# JWT — use the same dev default in tests; expiry set long so tokens never expire mid-test
app.jwt.secret=cXZldnJpLWRldi1zZWNyZXQta2V5LW11c3QtYmUtYXQtbGVhc3QtMzItY2hhcnM=
app.jwt.expiry-seconds=86400
