# QVEVRI server — main configuration
server.port=8080

# H2 file-backed dev database
spring.datasource.url=jdbc:h2:file:./data/game;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Flyway — disabled for dev/H2; enabled only in the prod profile
spring.flyway.enabled=false

# H2 console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# App settings
app.auth.auto-register=true

# JWT — stateless token signing (HS256).
# Dev default: a fixed 64-byte base64 secret.  Override in prod via env var / secrets manager.
# app.jwt.secret must be >= 32 chars; expiry in seconds (default 86400 = 24 h).
app.jwt.secret=cXZldnJpLWRldi1zZWNyZXQta2V5LW11c3QtYmUtYXQtbGVhc3QtMzItY2hhcnM=
app.jwt.expiry-seconds=86400

# World clock — 1 sim-day per 5 real seconds (matches the 5s scheduler tick, so
# the clock advances one day each tick; a ~300-day season passes in ~25 min and
# vine stages visibly change every couple minutes — a watchable live demo feel).
world.real-seconds-per-sim-day=5

# Logging
logging.level.com.game=INFO
logging.level.org.springframework.web.socket=WARN
