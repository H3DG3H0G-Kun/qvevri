# QVEVRI server — production profile (Postgres + Flyway)
# All sensitive values are read from environment variables; no secrets in code.

# ── Postgres datasource ───────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool (sane defaults for a modest prod deployment)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# validate: Hibernate checks schema matches entities but does NOT alter it.
# Flyway owns all DDL in prod.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ── H2 console — disabled in prod ────────────────────────────────────────────
spring.h2.console.enabled=false

# ── JWT ───────────────────────────────────────────────────────────────────────
# Override with a securely-generated secret in prod (env var / secrets manager).
app.jwt.secret=${JWT_SECRET}
app.jwt.expiry-seconds=86400
